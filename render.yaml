services:
  - type: web
    name: palabra-api
    runtime: python
    plan: free
    buildCommand: pip install uv && cd backend && uv sync && uv run python -c "from app.services.game import get_pattern_table; get_pattern_table()"
    startCommand: cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: CORS_ORIGINS
        sync: false
